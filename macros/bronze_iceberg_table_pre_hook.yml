version: 2

macros:
  - name: bronze_iceberg_table_pre_hook
    description: |
      Creates a Snowflake-managed Iceberg table in the bronze layer if it does not already exist.
      The table is backed by a Polaris external volume and registered in the specified Iceberg catalog.
      This macro is intended to be used as a dbt pre-hook on models that write to Iceberg-format
      bronze tables via a Polaris catalog.
      It also does an automatic refresh of the table metadata to ensure that the it's updated from the catalog.

      Example usage in dbt_project.yml:
        +pre-hook: "{% raw %}{{ dbt_cru_macros.bronze_iceberg_table_pre_hook('bronze_assets', 'my_schema', 'my_table') }}{% endraw %}"
    arguments:
      - name: database
        type: string
        description: >
          The Snowflake database in which the Iceberg table will be created
          (e.g. 'bronze_assets').
      - name: schema
        type: string
        description: >
          The schema within the target database in which the Iceberg table will be created
          (e.g. 'raw_ingest').
      - name: table_name
        type: string
        description: >
          The name of the Iceberg table to create. This value is also used as the
          catalog_table_name that maps the Snowflake object to its counterpart in the
          Iceberg catalog.
